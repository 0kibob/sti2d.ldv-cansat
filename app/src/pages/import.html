<div class="h-full flex flex-col gap-xs">

    <div class="flex flex-col r-md gap-xs overflow-h">
        <div class="flex flex-row bg-panel border-1 r-md p-xs gap-xs">

            <div class="flex flex-col gap-xxs">
                <label class="text-xs text-primary">Mission Name</label>
                <div class="input min-w-sm text-primary h-full">
                    <i data-lucide="pen"></i>
                    <input id="mission-name" type="input"/>
                </div>
            </div>

            <div class="flex flex-col gap-xxs">
                <label class="text-xs text-primary">Time</label>
                <div class="input text-primary h-full">
                    <i data-lucide="clock"></i>
                    <input id="mission-time" type="time"/>
                </div>
            </div>

            <div class="flex flex-col gap-xxs">
                <label class="text-xs text-primary">Date</label>
                <div class="input text-primary h-full">
                    <i data-lucide="calendar"></i>
                    <input id="mission-date" type="date"/>
                </div>
            </div>
            
            <div class="flex flex-col gap-xxs min-w-xxs">
                <label class="text-xs text-primary">Duration</label>
                <span id="mission-duration" class="text-primary border-1 r-sm p-xs">–</span>
            </div>

            <div class="flex flex-col gap-xxs min-w-xxs">
                <label class="text-xs text-primary">Samples</label>
                <span id="mission-samples" class="text-primary border-1 r-sm p-xs">–</span>
            </div>

            <div class="flex flex-col gap-xxs min-w-xxs">
                <label class="text-xs text-primary">Interval</label>
                <span id="mission-interval" class="text-primary border-1 r-sm p-xs">–</span>
            </div>

            <div class="flex-1"></div>

            <button id="confirm-button" class="icon fill w-fit"><i data-lucide="save" class="lg"></i>Save</button>
        </div>
    </div>

    <div class="flex flex-col flex-1 overflow-x-h overflow-y-auto">
        <div class="grid gap-xs flex-1">
            <div id="map" class="item bg-panel border-1 r-md text-primary p-sm"></div>
            <!-- <div id="temp" class="item bg-panel border-1 r-md text-primary p-sm"></div>
            <div id="pres" class="item bg-panel border-1 r-md text-primary p-sm"></div>
            <div id="accel" class="item bg-panel border-1 r-md text-primary p-sm"></div>
            <div id="gyro" class="item bg-panel border-1 r-md text-primary p-sm"></div> -->
            <canvas id="tempChart" class="item bg-panel border-1 r-md p-sm"></canvas>
            <canvas id="presChart" class="item bg-panel border-1 r-md p-sm"></canvas>
            <canvas id="accelChart" class="item bg-panel border-1 r-md p-sm"></canvas>
            <canvas id="gyroChart" class="item bg-panel border-1 r-md p-sm"></canvas>
        </div>
    </div>
</div>
